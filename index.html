<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Codesome 使用文档</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <meta name="description" content="Codesome 平台安装配置、问题排查与进阶使用文档">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="stylesheet" href="styles/home-tutorial-grid.css">
  <style>
    :root {
      --theme-color: #42b983;
    }
    .sidebar-nav > ul > li > p {
      font-weight: 700;
      margin: 12px 0 4px;
    }
    .sidebar.sidebar {
      padding-top: 64px;
    }
    .sidebar-toggle,
    body.close .sidebar-toggle {
      top: 12px;
      bottom: auto;
      left: 12px;
      width: 40px;
      height: 40px;
      padding: 13px 12px;
      background-color: hsla(0, 0%, 100%, 0.92);
      border-radius: 4px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.12);
    }
    .sidebar-toggle span:last-child {
      margin-bottom: 0;
    }
    .quick-home {
      position: fixed;
      right: 20px;
      bottom: 20px;
      z-index: 20;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 0 14px;
      border: 1px solid rgba(66, 185, 131, 0.45);
      border-radius: 4px;
      background-color: hsla(0, 0%, 100%, 0.95);
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.12);
      color: #34495e;
      font-size: 14px;
      line-height: 1;
      text-decoration: none;
      transition: color 0.2s, border-color 0.2s, box-shadow 0.2s;
    }
    .quick-home:hover,
    .quick-home:focus-visible {
      border-color: var(--theme-color);
      box-shadow: 0 2px 8px rgba(66, 185, 131, 0.24);
      color: var(--theme-color);
    }
    .quick-home:focus-visible {
      outline: 2px solid var(--theme-color);
      outline-offset: 2px;
    }
    .markdown-section img {
      border: 1px solid #eee;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div id="app">文档加载中…</div>
  <a class="quick-home" href="#/" aria-label="返回主界面" title="返回主界面">返回首页</a>
  <script>
    window.$docsify = {
      name: 'Codesome 文档',
      homepage: '03-Agentic入门宝典.md',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      maxLevel: 3,
      notFoundPage: true,
      search: {
        placeholder: '搜索文档',
        noData: '没有找到结果',
        depth: 1,
        paths: 'auto'
      },
      copyCode: {
        buttonText: '复制',
        errorText: '复制失败',
        successText: '已复制'
      }
    }
  </script>
  <script src="scripts/home-tutorial-grid.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-powershell.min.js"></script>
  <script>
    document.addEventListener('click', function (event) {
      var homeLink = event.target.closest('.quick-home');

      if (!homeLink) {
        return;
      }

      event.preventDefault();

      var searchInput = document.querySelector('.search input[type="search"]');
      if (searchInput) {
        searchInput.value = '';
        searchInput.dispatchEvent(new Event('input', { bubbles: true }));
      }

      window.location.hash = '#/';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  </script>
</body>
</html>
